<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AttendEase | Login</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h1 class="auth-title">College Attendance Management</h1>
        <p class="auth-subtitle">Sign in with your assigned account.</p>

        <form id="loginForm">
            <div>
                <label for="username">Username</label>
                <input id="username" name="username" type="text" required />
            </div>
            <div>
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required />
            </div>
            <button type="submit">Login</button>
            <p id="loginMessage" class="message"></p>
        </form>

        <div class="alert-box" style="margin-top: 1.25rem;">
            Demo users: <code>admin/admin123</code>, <code>teacher.cse/teacher123</code>,
            <code>student.cse.001/student123</code>, <code>hod.cse/hod123</code>
        </div>
    </div>
</div>

<script>
    window.APP_CONFIG = { rootPath: ".", apiBase: "http://localhost:8080" };
</script>
<script src="js/auth.js"></script>
<script>
    const form = document.getElementById("loginForm");
    const messageEl = document.getElementById("loginMessage");

    const existingUser = Auth.getCurrentUser();
    if (Auth.getToken() && existingUser) {
        Auth.goToDashboard(existingUser.role);
    }

    form.addEventListener("submit", async (event) => {
        event.preventDefault();
        messageEl.className = "message";
        messageEl.textContent = "Signing in...";

        const username = form.username.value.trim();
        const password = form.password.value;

        try {
            const user = await Auth.login(username, password);
            messageEl.className = "message success";
            messageEl.textContent = "Login successful. Redirecting...";
            Auth.goToDashboard(user.role);
        } catch (error) {
            messageEl.className = "message error";
            messageEl.textContent = error.message;
        }
    });
</script>
</body>
</html>
